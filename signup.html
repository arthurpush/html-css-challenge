<!DOCTYPE html>
<html lang="pt-br">

<head>

  <!-- Configurações básicas -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonte Roboto -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <title>Cadastro - Dev Mentor BR</title>

</head>

<body>

<!-- CONTAINER PRINCIPAL -->
<main class="container">

<!-- LADO ESQUERDO -->
<section class="left">

<h1>Nova conta</h1>

<!-- FORMULÁRIO DE CADASTRO -->
<form class="form" action="#" method="POST">

<!-- CAMPO NOME -->
<label for="name">Nome</label>

<input
id="name"
class="input"
type="text"
placeholder="Digite seu nome..."
required
>

<!-- CAMPO EMAIL -->
<label for="email">Email</label>

<input
id="email"
class="input"
type="email"
placeholder="Digite seu email..."
required
>

<!-- CAMPO SENHA -->
<label for="password">Senha</label>

<input
id="password"
class="input"
type="password"
placeholder="Digite sua senha..."
required
>

<!-- TERMOS -->
<div class="area">

<input
type="checkbox"
id="termos"
required
>

<label for="termos">
Concordo com os termos de uso
</label>

</div>

<!-- BOTÃO -->
<button class="button" type="submit">
Criar conta
</button>

</form>

<!-- LINK PARA LOGIN -->
<div class="area">

<span class="link">
Já possui uma conta?

<a href="index.html">
Faça login
</a>

</span>

</div>

</section>

<!-- LADO DIREITO (INFORMATIVO) -->
<section class="right">

<img
class="info-img"
src="assets/info.png"
alt="Informações do projeto"
>

<h2 class="subtitle">
Leve sua carreira ao próximo nível.
</h2>

<p class="description">
Projeto desenvolvido para praticar HTML e CSS criando
uma tela de login e cadastro responsiva.
</p>

</section>

</main>

</body>
</html>
