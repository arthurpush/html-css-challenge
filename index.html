<!DOCTYPE html>

<!-- Define que o documento é HTML5 -->
<html lang="pt-br">

<head>

  <!-- Configurações básicas -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonte Roboto do Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- CSS do projeto -->
  <link rel="stylesheet" href="style.css">

  <title>Login - Dev Mentor BR</title>

</head>

<body>

<!-- Container principal da aplicação -->
<main class="container">

<!-- LADO ESQUERDO (FORMULÁRIO) -->
<section class="left">

<h1>Minha conta</h1>

<!-- FORMULÁRIO DE LOGIN -->
<form class="form" action="#" method="POST">

<!-- LABEL melhora acessibilidade -->
<label>Email</label>
<input
class="input"
type="email"
placeholder="Digite seu email..."
required
>

<label>Senha</label>
<input
class="input"
type="password"
placeholder="Digite sua senha..."
required
>

<button class="button" type="submit">
Acessar conta
</button>

</form>

<!-- Link para cadastro -->
<div class="area">

<span class="link">
Novo por aqui?
<a href="signup.html">Cadastre-se</a>
</span>

</div>

</section>

<!-- LADO DIREITO (INFORMAÇÕES) -->
<section class="right">

<img
class="info-img"
src="assets/info.png"
alt="Informações do projeto"
>

<h2 class="subtitle">
Leve sua carreira ao próximo nível.
</h2>

<p class="description">
Este é um projeto de prática utilizando HTML e CSS
para desenvolver uma interface de login responsiva.
</p>

</section>

</main>

</body>
</html>
